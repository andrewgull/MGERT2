name: Python Code Style

on:
  push:
    branches:
     - dev
     - main
  pull_request:
    branches:
     - dev
     - main

  workflow_dispatch:

jobs:
  pycodestyle:
    name: Python Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.2
          cache: true
          environments: default

      - name: Check python style
        run: pixi run pycodestyle
