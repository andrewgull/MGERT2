name: Python Code Style

# Controls when the action will run.
on:
   # Triggers the workflow on push or pull request events but only for the master and develop branch
  push:
    branches:
     - dev
     - main
  pull_request:
    branches:
     - dev
     - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  pycodestyle:
    name: Python Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependecnies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.test.txt ]; then pip install -r requirements.test.txt; else pip install pycodestyle; fi
      - name: Check python style
        run: pycodestyle --max-line-length=130 --statistics workflow/scripts
