name: Python Test Coverage

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]
    paths: ['**.py']

permissions:
  pull-requests: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.4.2 pytest-cov==7.0.0 biopython==1.86 pandas seaborn matplotlib

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: '**.py'
          separator: ' '

      - name: Run tests and capture output
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          set -o pipefail
          pytest --cov=. --cov-report=term-missing --cov-fail-under=90 --color=no tests/units | tee pytest-coverage.txt

      - name: Pytest coverage comment
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: MishaKav/pytest-coverage-comment@v1.7.2
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          title: "🧬 Bioinformatics Script Coverage Report"
          badge-title: "Coverage"
          hide-badge: false
          create-new-comment: false
