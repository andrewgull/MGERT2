name: Snakefile Formatting Check

# 1. Define when this workflow should run
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

# 2. Define the job
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Step 2.1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2.2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 2.3: Install snakefmt and requirements
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.test.txt ]; then pip install -r requirements.test.txt; else pip install snakefmt; fi

      # Step 2.4: Run snakefmt check
      - name: Run snakefmt Check on Snakefile
        working-directory: tests/integration
        run: |
          snakefmt --check --verbose -l 130 ../../workflow/Snakefile
